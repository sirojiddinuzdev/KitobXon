<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kitobni o'chirish — KitobXon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'kitoblar-royhati' %}">📚 KitobXon</a>
        <div>
            <a href="{% url 'profil' %}" class="btn btn-outline-light btn-sm me-2">👤 {{ request.user.username }}</a>
            <a href="{% url 'chiqish' %}" class="btn btn-outline-light btn-sm">Chiqish</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="mb-4">Kitobni o'chirish</h4>
                    <p class="mb-3">Siz <strong>{{ kitob.nomi }}</strong> kitobini o‘chirmoqchisiz. Bu amal qaytarilmaydi.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger w-100">O'chirish</button>
                    </form>
                    <a href="{% url 'profil' %}" class="btn btn-outline-secondary w-100 mt-2">Bekor qilish</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
