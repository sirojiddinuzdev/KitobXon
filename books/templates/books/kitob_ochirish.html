{% extends "base.html" %}

{% block title %}Kitobni o'chirish — KitobXon{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="kx-panel fade-up">
                <div class="p-4 p-lg-5 text-center">
                    <div style="font-size:2.6rem;color:#dc2626;"><i class="bi bi-trash3"></i></div>
                    <h1 class="h4 mt-2 mb-3">Kitobni o'chirish</h1>
                    <p class="text-muted mb-4">
                        Siz <strong class="text-dark">{{ kitob.nomi }}</strong> kitobini o'chirmoqchisiz.
                        Bu amal qaytarilmaydi.
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger w-100 py-2 rounded-pill">Ha, o'chirish</button>
                    </form>
                    <a href="{% url 'profil' %}" class="btn btn-soft w-100 mt-2">Bekor qilish</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
