<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kitob qo'shish — KitobXon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'kitoblar-royhati' %}">📚 KitobXon</a>
        <div>
            <a href="{% url 'profil' %}" class="btn btn-outline-light btn-sm me-2">👤 {{ request.user.username }}</a>
            <a href="{% url 'chiqish' %}" class="btn btn-outline-light btn-sm">Chiqish</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="mb-4">📚 Kitob qo'shish</h4>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-dark w-100 mt-3">
                            Qo'shish
                        </button>
                    </form>
                    <a href="{% url 'profil' %}" class="btn btn-outline-secondary w-100 mt-2">
                        Bekor qilish
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
