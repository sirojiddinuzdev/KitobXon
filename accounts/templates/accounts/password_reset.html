{% extends "base.html" %}

{% block title %}Parolni tiklash — KitobXon{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="kx-panel fade-up">
                <div class="kx-panel-head">
                    <div style="font-size:2rem;"><i class="bi bi-key"></i></div>
                    <h1 class="h5 mb-0 mt-2">Parolni tiklash</h1>
                </div>
                <div class="p-4 p-lg-5">
                    <p class="text-muted small">Emailingizni kiriting — parolni tiklash havolasini yuboramiz.</p>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-grad w-100 py-2 mt-2">Havolani yuborish</button>
                    </form>
                    <p class="text-center mt-3 mb-0"><a href="{% url 'kirish' %}" class="small text-muted">← Kirishga qaytish</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
