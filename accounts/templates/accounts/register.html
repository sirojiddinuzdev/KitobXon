<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>KitobXon — Roʻyxatdan oʻtish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { border: none; border-radius: 1rem; }
        .card-header { background: #212529; color: #fff; border-radius: 1rem 1rem 0 0; }
        .form-label { font-weight: 600; }
        .form-control { border-radius: .5rem; }
        .auth-note { color: #6c757d; }
        .auth-card { max-width: 520px; margin: auto; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="auth-card">
        <div class="card shadow-sm">
            <div class="card-header text-center py-4">
                <h3 class="mb-1">📚 KitobXon</h3>
                <p class="mb-0 auth-note">Kitob almashish va ulashish platformasiga xush kelibsiz</p>
            </div>
            <div class="card-body p-4">
                <h5 class="mb-4 text-center">Roʻyxatdan oʻtish</h5>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100 py-2 mt-3">
                        Hisob yaratish
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-1">Allaqachon roʻyxatdan oʻtganmisiz?</p>
                    <a href="{% url 'kirish' %}" class="btn btn-outline-secondary btn-sm">Kirish sahifasiga oʻtish</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
