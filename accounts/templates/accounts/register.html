{% extends "base.html" %}

{% block title %}Ro'yxatdan o'tish — KitobXon{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="kx-panel fade-up">
                <div class="kx-panel-head">
                    <div style="font-size:2rem;">📚</div>
                    <h1 class="h4 mb-1 mt-2">KitobXon'ga qo'shiling</h1>
                    <p class="mb-0 small" style="opacity:.9;">Kitob almashish platformasiga xush kelibsiz</p>
                </div>
                <div class="p-4 p-lg-5">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-grad w-100 py-2 mt-2">Hisob yaratish</button>
                    </form>
                    <p class="text-center mt-4 mb-0 text-muted">
                        Allaqachon hisobingiz bormi?
                        <a href="{% url 'kirish' %}" class="fw-semibold" style="color:var(--primary-dark);">Kirish</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
