{% extends "base.html" %}

{% block title %}Emailni tasdiqlang — KitobXon{% endblock %}

{% block content %}

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="kx-panel fade-up text-center p-4 p-lg-5">
                <div style="font-size:2.8rem;color:var(--primary);"><i class="bi bi-envelope-check"></i></div>
                <h1 class="h4 mt-2 mb-3">Emailingizni tekshiring</h1>
                <p class="text-muted mb-1">
                    <strong class="text-dark">{{ email }}</strong> manziliga tasdiqlash havolasi yuborildi.
                </p>
                <p class="text-muted mb-4">Hisobni faollashtirish uchun havolani bosing.</p>
                <a href="{% url 'kirish' %}" class="btn btn-soft w-100">Kirish sahifasiga</a>

        </div>
    </div>
</div>
{% endblock %}
