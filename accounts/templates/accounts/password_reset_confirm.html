{% extends "base.html" %}

{% block title %}Yangi parol — KitobXon{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="kx-panel fade-up">
                <div class="kx-panel-head">
                    <div style="font-size:2rem;"><i class="bi bi-shield-lock"></i></div>
                    <h1 class="h5 mb-0 mt-2">Yangi parol o'rnatish</h1>
                </div>
                <div class="p-4 p-lg-5">
                    {% if validlink %}
                        <form method="POST">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-grad w-100 py-2 mt-2">Parolni saqlash</button>
                        </form>
                    {% else %}
                        <div class="text-center">
                            <div style="font-size:2.4rem;color:#dc2626;"><i class="bi bi-exclamation-octagon"></i></div>
                            <p class="text-muted mt-2">Havola yaroqsiz yoki eskirgan.</p>
                            <a href="{% url 'parol-tiklash' %}" class="btn btn-grad w-100">Qaytadan urinish</a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
